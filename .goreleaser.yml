version: 2

project_name: pipeboard

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/pipeboard-co/pipeboard-cli/cmd.Version={{.Version}}
      - -X github.com/pipeboard-co/pipeboard-cli/cmd.Commit={{.ShortCommit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: pipeboard
    repository:
      owner: pipeboard-co
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/pipeboard-co/pipeboard-cli"
    description: "CLI for managing Meta, Google, and TikTok Ads via Pipeboard"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
